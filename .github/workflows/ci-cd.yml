name: NexaHub CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: |
          cd nexahub-backend
          mvn clean package -DskipTests

      - name: Build Docker image
        run: |
          cd nexahub-backend
          docker build -t nexahub-backend .

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd nexahub-frontend
          npm ci

      - name: Build Angular
        run: |
          cd nexahub-frontend
          npm run build -- --configuration production

      - name: Build Docker image
        run: |
          cd nexahub-frontend
          docker build -t nexahub-frontend .

  docker-compose-test:
    name: Docker Compose Test
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - uses: actions/checkout@v3

      - name: Build and run with Docker Compose
        run: |
          docker-compose up --build -d
          sleep 30
          curl -f http://localhost/index.html || exit 1
          curl -f http://localhost:9090/api/auth/test || exit 1

      - name: Stop containers
        run: docker-compose down