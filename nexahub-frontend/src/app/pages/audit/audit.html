<div style="display:flex">
  <app-sidebar></app-sidebar>

  <div class="main-content">

    <!-- HEADER -->
    <div class="page-header">
      <h2>Audit Log</h2>
      <button class="btn-secondary" (click)="exportCSV()">
        Export CSV
      </button>
    </div>

    <!-- ✅ ADD HERE -->
    <div class="toolbar">

      <div class="filters">
        <button *ngFor="let f of filters"
                [class.active]="selectedFilter === f"
                (click)="filterBy(f)">
          {{ f }}
        </button>
      </div>

      <div class="actions">
        <input type="text"
               placeholder="Search user..."
               (input)="onSearch($event)" />

        <button class="btn-export" (click)="exportCSV()">
          ⬇ Export
        </button>
      </div>

    </div>

    <!-- ✅ NEW TABLE -->
    <div class="card-box">
      <table>
        <thead>
          <tr>
            <th>Time</th>
            <th>User</th>
            <th>Action</th>
            <th>Details</th>
            <th>Company</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let action of filtered">

            <td class="time">
              {{ action.dateAction | date:'dd/MM HH:mm' }}
            </td>

            <td>
              <div class="user-cell">
                <div class="avatar">
                  {{ action.utilisateur?.nom?.charAt(0)?.toUpperCase() }}
                </div>
                {{ action.utilisateur?.nom }}
              </div>
            </td>

            <td>
              <span class="badge" [ngClass]="action.action">
                {{ getIcon(action.action) }} {{ action.action }}
              </span>
            </td>

            <td class="details">
              {{ action.details }}
            </td>

            <td>
              {{ action.company }}
            </td>

          </tr>

          <tr *ngIf="filtered.length === 0">
            <td colspan="5" class="empty">
              No actions found
            </td>
          </tr>

        </tbody>
      </table>
    </div>

  </div>
</div>
