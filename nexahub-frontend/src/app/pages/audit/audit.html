<div style="display:flex">
  <app-sidebar></app-sidebar>
  <div class="main-content">

    <div class="page-header">
      <h2>Audit Log</h2>
      <button class="btn-secondary" (click)="exportCSV()">
        Export CSV
      </button>
    </div>

    <!-- Filters -->
    <div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px;">
      <button *ngFor="let f of filters"
              [style.background]="selectedFilter === f ?
                '#0984e3' : 'white'"
              [style.color]="selectedFilter === f ? 'white' : '#2d3436'"
              style="border:1px solid #dfe6e9; border-radius:20px;
                     padding:5px 14px; font-size:12px; cursor:pointer;"
              (click)="filterBy(f)">
        {{ f }}
      </button>
    </div>

    <div class="card-box">
      <table>
        <thead>
          <tr>
            <th>Time</th>
            <th>User</th>
            <th>Action</th>
            <th>Details</th>
            <th>Company</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let action of filtered">
            <td style="color:#636e72; font-size:12px;">
              {{ action.dateAction | date:'dd/MM HH:mm' }}
            </td>
            <td>
              <div style="display:flex; align-items:center; gap:8px;">
                <div class="avatar"
                     style="width:26px; height:26px; font-size:11px;">
                  {{ action.utilisateur?.nom?.charAt(0)?.toUpperCase() }}
                </div>
                {{ action.utilisateur?.nom }}
              </div>
            </td>
            <td>
              <span [class]="getBadgeClass(action.action)">
                {{ action.action }}
              </span>
            </td>
            <td style="color:#636e72; font-size:13px;">
              {{ action.details }}
            </td>
            <td style="font-size:13px;">{{ action.company }}</td>
          </tr>
          <tr *ngIf="filtered.length === 0">
            <td colspan="5"
                style="text-align:center; color:#636e72; padding:30px;">
              No actions found
            </td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>
</div>
