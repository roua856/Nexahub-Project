<div class="auth-container">
  <div class="auth-card">

    <div class="logo">
      <h1>🔐 NexaHub</h1>
      <p>User & Role Management Platform</p>
    </div>

    <div *ngIf="error" class="alert-error">{{ error }}</div>

    <!-- LOGIN -->
    <div *ngIf="isLoginMode">
      <div class="form-group">
        <label>Email address</label>
        <input type="email" class="form-control"
               [(ngModel)]="loginData.email"
               placeholder="Enter your email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" class="form-control"
               [(ngModel)]="loginData.motDePasse"
               placeholder="Enter your password">
      </div>
      <button class="btn-primary" (click)="login()" [disabled]="loading">
        {{ loading ? 'Signing in...' : 'Sign in' }}
      </button>
      <p style="text-align:center; margin-top:16px; font-size:13px; color:#636e72;">
        Want a workspace?
        <a href="#" (click)="$event.preventDefault(); isLoginMode=false"
           style="color:#0984e3;">
          Register here
        </a>
      </p>
    </div>

    <!-- REGISTER -->
    <div *ngIf="!isLoginMode">
      <div style="background:#e6f1fb; border-radius:8px; padding:10px 14px;
                  font-size:13px; color:#0c447c; margin-bottom:16px;">
        This creates a new company workspace. You will be the ADMIN.
      </div>
      <div class="form-group">
        <label>Full name</label>
        <input type="text" class="form-control"
               [(ngModel)]="registerData.nom"
               placeholder="e.g. Ahmed Ben Salem">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" class="form-control"
               [(ngModel)]="registerData.email"
               placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" class="form-control"
               [(ngModel)]="registerData.motDePasse"
               placeholder="Choose a strong password">
      </div>
      <div class="form-group">
        <label>Company name</label>
        <input type="text" class="form-control"
               [(ngModel)]="registerData.company"
               placeholder="e.g. Acme Corp">
      </div>
      <button class="btn-primary" (click)="register()" [disabled]="loading">
        {{ loading ? 'Creating...' : 'Create company workspace' }}
      </button>
      <p style="text-align:center; margin-top:16px; font-size:13px; color:#636e72;">
        Already have an account?
        <a href="#" (click)="$event.preventDefault(); isLoginMode=true"
           style="color:#0984e3;">
          Sign in
        </a>
      </p>
    </div>

  </div>
</div>
