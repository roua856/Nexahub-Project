<div class="sidebar">

  <div>

    <div class="logo">
      <div class="logo-icon">
        <svg width="22" height="22" fill="none" viewBox="0 0 24 24">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"
            stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div>
        <div class="logo-title">NexaHub</div>
        <div class="logo-subtitle">Workspace Platform</div>
      </div>
    </div>

    <a class="nav-item" routerLink="/dashboard" routerLinkActive="active">
      <svg class="nav-icon" fill="none" viewBox="0 0 24 24">
        <rect x="3" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/>
        <rect x="14" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/>
        <rect x="3" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/>
        <rect x="14" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/>
      </svg>
      <span>Dashboard</span>
    </a>

    <a *ngIf="authService.hasPermission('VIEW_USERS')"
      class="nav-item" routerLink="/users" routerLinkActive="active">
      <svg class="nav-icon" fill="none" viewBox="0 0 24 24">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <circle cx="9" cy="7" r="4" stroke="currentColor" stroke-width="2"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span>Users</span>
    </a>

    <a *ngIf="authService.hasPermission('VIEW_TASKS')"
      class="nav-item" routerLink="/tasks" routerLinkActive="active">
      <svg class="nav-icon" fill="none" viewBox="0 0 24 24">
        <rect x="3" y="3" width="18" height="18" rx="3" stroke="currentColor" stroke-width="2"/>
        <path d="M8 12h8M8 8h8M8 16h5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span>{{ authService.hasPermission('CREATE_TASK') ? 'Tasks' : 'My Tasks' }}</span>
    </a>

    <a *ngIf="authService.hasPermission('VIEW_ROLES')"
      class="nav-item" routerLink="/roles" routerLinkActive="active">
      <svg class="nav-icon" fill="none" viewBox="0 0 24 24">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>Roles & Permissions</span>
    </a>

    <a *ngIf="authService.hasPermission('VIEW_AUDIT')"
      class="nav-item" routerLink="/audit" routerLinkActive="active">
      <svg class="nav-icon" fill="none" viewBox="0 0 24 24">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <polyline points="14 2 14 8 20 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="16" y1="13" x2="8" y2="13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <line x1="16" y1="17" x2="8" y2="17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <line x1="10" y1="9" x2="8" y2="9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span>Audit Log</span>
    </a>

    <a *ngIf="authService.hasPermission('VIEW_ANNOUNCEMENTS')"
      class="nav-item" routerLink="/announcements" routerLinkActive="active">
      <svg class="nav-icon" fill="none" viewBox="0 0 24 24">
        <path d="M22 12h-4l-3 9L9 3l-3 9H2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>Announcements</span>
    </a>
    <a class="nav-item" routerLink="/notifications" routerLinkActive="active">
      <svg class="nav-icon" fill="none" viewBox="0 0 24 24">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span>Notifications</span>
   </a>
   

  </div>

   
  <div class="logout" (click)="logout()">
    <svg width="18" height="18" fill="none" viewBox="0 0 24 24">
      <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
      <polyline points="16 17 21 12 16 7" stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="21" y1="12" x2="9" y2="12" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <span>Logout</span>
  </div>

</div>
