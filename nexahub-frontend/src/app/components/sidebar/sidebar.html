<div class="sidebar">

  <!-- TOP -->
  <div>

    <div class="logo">

      <div class="logo-icon">
        <span>◆</span>
      </div>

      <div>
        <div class="logo-title">
          NexaHub
        </div>

        <div class="logo-subtitle">
          Workspace Platform
        </div>
      </div>

    </div>

    <!-- DASHBOARD -->
    <a
      *ngIf="authService.hasPermission('VIEW_DASHBOARD')"
      class="nav-item"
      routerLink="/dashboard"
      routerLinkActive="active">

      <span class="nav-icon">◫</span>
      <span>Dashboard</span>
    </a>

    <!-- USERS -->
    <a
      *ngIf="authService.hasPermission('VIEW_USERS')"
      class="nav-item"
      routerLink="/users"
      routerLinkActive="active">

      <span class="nav-icon">◎</span>
      <span>Users</span>
    </a>

    <!-- TASKS -->
    <a
      *ngIf="authService.hasPermission('VIEW_TASKS')"
      class="nav-item"
      routerLink="/tasks"
      routerLinkActive="active">

      <span class="nav-icon">▣</span>

      <span>
        {{ authService.hasPermission('CREATE_TASK') ? 'Tasks' : 'My Tasks' }}
      </span>
    </a>

    <!-- ROLES -->
    <a
      *ngIf="authService.hasPermission('VIEW_ROLES')"
      class="nav-item"
      routerLink="/roles"
      routerLinkActive="active">

      <span class="nav-icon">⬢</span>
      <span>Roles & Permissions</span>
    </a>

    <!-- AUDIT -->
    <a
      *ngIf="authService.hasPermission('VIEW_AUDIT')"
      class="nav-item"
      routerLink="/audit"
      routerLinkActive="active">

      <span class="nav-icon">☰</span>
      <span>Audit Log</span>
    </a>

    <!-- ANNOUNCEMENTS -->
    <a
      *ngIf="authService.hasPermission('VIEW_ANNOUNCEMENTS')"
      class="nav-item"
      routerLink="/announcements"
      routerLinkActive="active">

      <span class="nav-icon">📢</span>
      <span>Announcements</span>
    </a>

    <!-- PROFILE -->
    <a
      *ngIf="authService.hasPermission('VIEW_PROFILE')"
      class="nav-item"
      routerLink="/profile"
      routerLinkActive="active">

      <span class="nav-icon">○</span>
      <span>My Profile</span>
    </a>

  </div>

  <!-- BOTTOM -->
  <div>

    <div class="user-card">

      <div class="avatar">
        {{ user?.nom?.charAt(0)?.toUpperCase() }}
      </div>

      <div class="user-info">

        <div class="user-name">
          {{ user?.nom }}
        </div>

        <div class="user-role">
          {{ getRole() }}
        </div>

      </div>
    </div>

    <div class="logout" (click)="logout()">
      <span>↳</span>
      <span>Logout</span>
    </div>

  </div>

</div>
