services:

  mysql:
    image: mysql:8.0
    container_name: nexahub-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_DATABASE: nexahub_db
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - nexahub-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./nexahub-backend
      dockerfile: Dockerfile
    container_name: nexahub-backend
    restart: always
    ports:
      - "9090:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/nexahub_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ""
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      JWT_SECRET: nexahub_secret_key_2025_must_be_long
      JWT_EXPIRATION: 86400000
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - nexahub-network

  frontend:
    build:
      context: ./Nexahub-frontend
      dockerfile: Dockerfile
    container_name: nexahub-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - nexahub-network

networks:
  nexahub-network:
    driver: bridge

volumes:
  mysql-data: